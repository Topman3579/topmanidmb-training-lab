name: leak-guard
# Backstop scan for PRIVATE repos — fail (red X + email) if a case identifier / Thai ID /
# secret / internal-network pattern is committed. Primary guard = local pre-push hook; this is
# the server-side net for pushes from other nodes or the web editor.
# Generic patterns only (no real codenames). Skips minified/vendor assets to avoid false positives.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for sensitive patterns
        run: |
          set -uo pipefail
          patterns=(
            '2569[0-9]{4}'
            '[0-9]{13}'
            '-----BEGIN [A-Z ]*PRIVATE KEY-----'
            'AGE-SECRET-KEY-1[A-Z0-9]+'
            '(ghp|gho|ghu|ghs)_[A-Za-z0-9]{20,}'
            'github_pat_[A-Za-z0-9_]{20,}'
            'sk-ant-[A-Za-z0-9_-]{20,}'
            'sk-[A-Za-z0-9]{32,}'
            'xox[bp]-[A-Za-z0-9-]{10,}'
            'AKIA[A-Z0-9]{16}'
            '100\.(6[4-9]|[7-9][0-9]|1[0-1][0-9]|12[0-7])\.[0-9]{1,3}\.[0-9]{1,3}'
            '10\.10\.10\.[0-9]{1,3}'
            '192\.168\.[0-9]{1,3}\.[0-9]{1,3}'
            '[a-z0-9]+\.ts\.net'
          )
          hits=0
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            case "$f" in
              .github/workflows/leak-guard.yml) continue ;;
              *.min.js|*.min.css|*/vendor/*|*/libs/*) continue ;;
            esac
            for p in "${patterns[@]}"; do
              if grep -nEI "$p" "$f" >/dev/null 2>&1; then
                echo "::error file=$f::sensitive pattern matched: /$p/"
                hits=$((hits+1))
              fi
            done
          done < <(git ls-files)
          if [ "$hits" -gt 0 ]; then
            echo "🛑 leak-guard: $hits match(es) — failing"
            exit 1
          fi
          echo "✅ leak-guard: clean"
